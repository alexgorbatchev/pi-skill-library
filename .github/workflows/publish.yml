name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p 'require("./package.json").name')" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Check npm for existing package version
        id: npm
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "alreadyPublished=true" >> "$GITHUB_OUTPUT"
            echo "Package version already exists on npm; skipping publish."
          else
            echo "alreadyPublished=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.npm.outputs.alreadyPublished != 'true'
        run: npm publish --provenance --access public
